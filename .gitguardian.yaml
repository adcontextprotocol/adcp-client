# GitGuardian / ggshield configuration
# Reference: https://docs.gitguardian.com/ggshield-docs/reference/config

version: 2

secret:
  # Treat the listed match patterns as known false-positives. Each entry
  # has to be specific enough that a real leaked credential matching the
  # same shape would NOT slip through — these allowlist entries target
  # patterns we ship deliberately (regex character classes, obviously-
  # fake placeholder tokens), not entropy-tier classes.
  ignored-matches:
    - name: bearer-scrub-regex-character-class
      # `src/lib/testing/storyboard/agent-routing.ts` ships a runtime
      # bearer-token redaction helper (`scrubAuthSecrets`). Its regex
      # character class `[A-Za-z0-9._~+/=-]+` is the *match* for tokens
      # in upstream error messages, not an encoded secret. The class
      # spans enough mixed-case alphanumeric + symbol territory to look
      # high-entropy to scanners.
      match: "[A-Za-z0-9._~+/=-]+"
    - name: bearer-scrub-test-placeholders
      # `test/lib/agent-routing.test.js` exercises the scrub helper with
      # deliberately-fake placeholder tokens (`FAKE_BEARER_PLACEHOLDER_VALUE`,
      # `FAKE.JWT.PLACEHOLDER`, `FAKE_QUERY_PLACEHOLDER_*`). The regex
      # matches on shape, not entropy, so placeholders verify the same
      # patterns without shipping anything that could ever be a credential.
      match: "FAKE_(?:BEARER|JWT|QUERY)_PLACEHOLDER"
