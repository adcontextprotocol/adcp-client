name: Reference Seller Interop

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      python_ref:
        description: 'adcp-client-python commit SHA, tag, or branch to test against'
        required: false
        default: '92b1618c3bebfef481f3deef423cbe29d8820de3'
      runner_package_ref:
        description: 'Optional @adcp/sdk npm package ref for manual runner probes, e.g. adcp-3.0 or @adcp/sdk@adcp-3.1. Empty packs this checkout.'
        required: false
        default: ''
  workflow_call:
    inputs:
      python_ref:
        description: 'adcp-client-python commit SHA, tag, or branch to test against'
        required: false
        type: string
        default: '92b1618c3bebfef481f3deef423cbe29d8820de3'
      runner_package_ref:
        description: 'Optional @adcp/sdk npm package ref for manual runner probes. Empty packs this checkout.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  pack-sdk-runner:
    name: Pack SDK runner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUNNER_PACKAGE_REF: ${{ inputs.runner_package_ref || '' }}

    steps:
      - name: Checkout @adcp/sdk
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: env.RUNNER_PACKAGE_REF == ''
        run: npm ci

      - name: Build SDK runner
        if: env.RUNNER_PACKAGE_REF == ''
        run: npm run build:lib

      - name: Pack SDK runner
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="$RUNNER_TEMP/adcp-sdk-pack"
          mkdir -p "$pack_dir"
          if [[ -n "${RUNNER_PACKAGE_REF:-}" ]]; then
            package_ref="$RUNNER_PACKAGE_REF"
            if [[ "$package_ref" != @adcp/sdk@* ]]; then
              package_ref="@adcp/sdk@$package_ref"
            fi
            echo "Packing SDK runner from npm package ref $package_ref"
            npm pack "$package_ref" --pack-destination "$pack_dir" --silent
          else
            echo "Packing SDK runner from this checkout"
            npm pack --pack-destination "$pack_dir" --silent
          fi
          mapfile -t tarballs < <(find "$pack_dir" -maxdepth 1 -type f -name '*.tgz' -print)
          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "::error::Expected one packed SDK tarball in $pack_dir, found ${#tarballs[@]}."
            printf '%s\n' "${tarballs[@]}"
            exit 1
          fi
          echo "Packed SDK runner at ${tarballs[0]}"

      - name: Upload SDK runner tarball
        uses: actions/upload-artifact@v4
        with:
          name: adcp-sdk-runner-tarball
          if-no-files-found: error
          path: ${{ runner.temp }}/adcp-sdk-pack/*.tgz

  reference-seller-matrix:
    name: ${{ matrix.language }} reference seller
    needs: pack-sdk-runner
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add Go here only after adcp-go has shipped a tagged, known-good
          # reusable harness.
          - language: python
            repository: adcontextprotocol/adcp-client-python
            ref: ${{ inputs.python_ref || '92b1618c3bebfef481f3deef423cbe29d8820de3' }}
            harness: scripts/ci/run_storyboard_reference_seller.sh
            port: 3001
            advisory: true
          - language: typescript
            repository: adcontextprotocol/adcp-client
            ref: 97aef9f9561983b21605e77c3377bbdc0641b61c # @adcp/sdk@8.1.0-beta.12
            harness: scripts/ci/run_storyboard_reference_seller.sh
            port: 3002
            advisory: true
    env:
      STORYBOARD_RESULT_PATH: ${{ github.workspace }}/storyboard-result-${{ matrix.language }}.json
      SELLER_LOG_PATH: ${{ github.workspace }}/storyboard-seller-${{ matrix.language }}.log

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download SDK runner tarball
        uses: actions/download-artifact@v4
        with:
          name: adcp-sdk-runner-tarball
          path: ${{ runner.temp }}/adcp-sdk-pack

      - name: Resolve SDK runner tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tarballs < <(find "$RUNNER_TEMP/adcp-sdk-pack" -maxdepth 1 -type f -name '*.tgz' -print)
          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "::error::Expected one SDK runner tarball, found ${#tarballs[@]}."
            printf '%s\n' "${tarballs[@]}"
            exit 1
          fi
          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"
          echo "Using SDK runner tarball ${tarballs[0]}"

      - name: Checkout ${{ matrix.language }} reference seller
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: reference-${{ matrix.language }}
          persist-credentials: false

      - name: Verify ${{ matrix.language }} storyboard harness
        shell: bash
        run: |
          set -euo pipefail
          harness="reference-${{ matrix.language }}/${{ matrix.harness }}"
          if [[ ! -f "$harness" ]]; then
            echo "::error::Pinned ${{ matrix.repository }} ref '${{ matrix.ref }}' does not contain ${{ matrix.harness }}."
            echo "::error::Pin a tag or commit that includes a blocking reference-seller storyboard harness."
            exit 1
          fi
          chmod +x "$harness"

      - name: Run ${{ matrix.language }} reference seller storyboard
        shell: bash
        run: |
          set -euo pipefail
          cd "reference-${{ matrix.language }}"
          set +e
          ADCP_SDK_TARBALL="${{ steps.pack.outputs.tarball }}" \
            ADCP_PORT="${{ matrix.port }}" \
            STORYBOARD_RESULT_PATH="$STORYBOARD_RESULT_PATH" \
            SELLER_LOG_PATH="$SELLER_LOG_PATH" \
            ./${{ matrix.harness }}
          status=$?
          set -e

          if [[ "$status" -ne 0 && "${{ matrix.advisory }}" == "true" ]]; then
            echo "::warning::${{ matrix.language }} reference seller storyboard failed, but this lane is advisory for the current SDK prerelease."
            exit 0
          fi

          exit "$status"

      - name: Add interop summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Reference seller interop"
            echo ""
            echo "- Implementation: \`${{ matrix.language }}\`"
            echo "- Repository: \`${{ matrix.repository }}\`"
            echo "- Ref: \`${{ matrix.ref }}\`"
            echo "- Harness: \`${{ matrix.harness }}\`"
            echo "- Advisory: \`${{ matrix.advisory }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload storyboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.language }}-reference-seller-storyboard
          if-no-files-found: ignore
          path: |
            storyboard-result-${{ matrix.language }}.json
            storyboard-seller-${{ matrix.language }}.log

  typescript-reference-seller-current:
    name: TypeScript reference seller (current checkout)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: pack-sdk-runner
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      STORYBOARD_RESULT_PATH: ${{ github.workspace }}/storyboard-result-typescript.json
      SELLER_LOG_PATH: ${{ github.workspace }}/storyboard-seller-typescript.log

    steps:
      - name: Checkout @adcp/sdk
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Download SDK runner tarball
        uses: actions/download-artifact@v4
        with:
          name: adcp-sdk-runner-tarball
          path: ${{ runner.temp }}/adcp-sdk-pack

      - name: Resolve SDK runner tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tarballs < <(find "$RUNNER_TEMP/adcp-sdk-pack" -maxdepth 1 -type f -name '*.tgz' -print)
          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "::error::Expected one SDK runner tarball, found ${#tarballs[@]}."
            printf '%s\n' "${tarballs[@]}"
            exit 1
          fi
          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"
          echo "Using SDK runner tarball ${tarballs[0]}"

      - name: Run TypeScript example seller storyboard
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ci/run_storyboard_reference_seller.sh
          ADCP_SDK_TARBALL="${{ steps.pack.outputs.tarball }}" \
            ADCP_PORT=3002 \
            STORYBOARD_RESULT_PATH="$STORYBOARD_RESULT_PATH" \
            SELLER_LOG_PATH="$SELLER_LOG_PATH" \
            ./scripts/ci/run_storyboard_reference_seller.sh

      - name: Add interop summary
        if: always()
        shell: bash
        run: |
          {
            echo "### TypeScript reference seller harness"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Ref: current checkout \`${{ github.sha }}\`"
            echo "- Seller: \`examples/hello_seller_adapter_guaranteed.ts\`"
            echo "- Harness: \`scripts/ci/run_storyboard_reference_seller.sh\`"
            echo "- Note: tagged TypeScript release compatibility is covered by the matrix row pinned to @adcp/sdk@8.1.0-beta.12."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload storyboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-reference-seller-storyboard
          if-no-files-found: ignore
          path: |
            storyboard-result-typescript.json
            storyboard-seller-typescript.log

  typescript-strict-adcp-3-0-reference-seller:
    name: TypeScript strict AdCP 3.0 reference seller
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    needs: pack-sdk-runner
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      STORYBOARD_RESULT_PATH: ${{ github.workspace }}/storyboard-result-typescript-strict-3-0.json
      SELLER_LOG_PATH: ${{ github.workspace }}/storyboard-seller-typescript-strict-3-0.log
      # v5.22.0 is the final tagged TypeScript SDK release line pinned to
      # AdCP 3.0.x before the 3.1 beta envelope shipped. The harness runs it
      # behind a strict proxy that rejects the 3.1-only adcp_version marker.
      STRICT_ADCP_3_0_REF: 88bacfdcc0fca4066462d5b621ffc2d7f7a5d348

    steps:
      - name: Checkout candidate @adcp/sdk
        uses: actions/checkout@v5
        with:
          path: candidate-sdk
          persist-credentials: false

      - name: Checkout pinned strict AdCP 3.0 TypeScript reference seller
        uses: actions/checkout@v5
        with:
          repository: adcontextprotocol/adcp-client
          ref: ${{ env.STRICT_ADCP_3_0_REF }}
          path: reference-typescript-strict-3-0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Download SDK runner tarball
        uses: actions/download-artifact@v4
        with:
          name: adcp-sdk-runner-tarball
          path: ${{ runner.temp }}/adcp-sdk-pack

      - name: Resolve SDK runner tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tarballs < <(find "$RUNNER_TEMP/adcp-sdk-pack" -maxdepth 1 -type f -name '*.tgz' -print)
          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "::error::Expected one SDK runner tarball, found ${#tarballs[@]}."
            printf '%s\n' "${tarballs[@]}"
            exit 1
          fi
          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"
          echo "Using SDK runner tarball ${tarballs[0]}"

      - name: Run strict AdCP 3.0 reference seller storyboard
        shell: bash
        run: |
          set -euo pipefail
          chmod +x candidate-sdk/scripts/ci/run_storyboard_strict_3_0_reference_seller.sh
          ADCP_SDK_TARBALL="${{ steps.pack.outputs.tarball }}" \
            ADCP_REFERENCE_REPO_ROOT="${{ github.workspace }}/reference-typescript-strict-3-0" \
            ADCP_PORT=3003 \
            ADCP_INTERNAL_PORT=3004 \
            STORYBOARD_RESULT_PATH="$STORYBOARD_RESULT_PATH" \
            SELLER_LOG_PATH="$SELLER_LOG_PATH" \
            candidate-sdk/scripts/ci/run_storyboard_strict_3_0_reference_seller.sh

      - name: Add interop summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Strict AdCP 3.0 reference seller interop"
            echo ""
            echo "- Repository: \`adcontextprotocol/adcp-client\`"
            echo "- Ref: \`${STRICT_ADCP_3_0_REF}\`"
            echo "- Protocol pin: AdCP 3.0.x"
            echo "- Harness: \`scripts/ci/run_storyboard_strict_3_0_reference_seller.sh\`"
            echo "- Advisory: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload storyboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-strict-adcp-3-0-reference-seller-storyboard
          if-no-files-found: ignore
          path: |
            storyboard-result-typescript-strict-3-0.json
            storyboard-seller-typescript-strict-3-0.log
