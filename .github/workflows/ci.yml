name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  generated-checks:
    name: Generated, Docs & Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Lint GitHub Actions workflows
        run: npm run lint:workflows

      - name: Sync schemas from AdCP
        run: npm run sync-schemas:all

      - name: Validate generated files are in sync
        run: |
          npm run generate-types
          npm run generate-types:v2.5
          npm run generate-wellknown-schemas
          npm run generate-registry-types

          if ! git diff --exit-code -I '// Generated at:' src/lib/types/*.generated.ts src/lib/types/v2-5/tools.generated.ts src/lib/agents/index.generated.ts src/lib/registry/types.generated.ts schemas/registry/registry.yaml 2>/dev/null; then
            echo ""
            echo "❌ Generated TypeScript files are out of sync with AdCP schemas or registry OpenAPI!"
            echo ""
            echo "📋 Changes detected in:"
            git diff --name-only src/lib/types/*.generated.ts src/lib/types/v2-5/tools.generated.ts src/lib/agents/index.generated.ts src/lib/registry/types.generated.ts schemas/registry/registry.yaml 2>/dev/null || true
            echo ""
            echo "🔧 To fix, run locally:"
            echo "  npm run sync-schemas:all"
            echo "  npm run generate-types:all"
            echo "  npm run generate-wellknown-schemas"
            echo "  npm run generate-registry-types"
            echo ""
            echo "Then commit the updated generated files."
            exit 1
          fi

          echo "✅ Generated files are in sync with schemas"

      - name: Codegen strictness — no loose oneOf arms
        run: npm run ci:codegen-strict

      - name: Check protocol-managed skills present and paths resolve
        run: npm run check:skill-sync

      - name: Validate agent docs are in sync
        run: npm run ci:docs-check

      - name: Check SDK→docs URLs resolve (URL-rot guard)
        run: npm run ci:doc-links

  typescript-typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run typecheck

  library-build:
    name: Library Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Validate package exports
        run: |
          node -e "
            const pkg = require('./package.json');
            const fs = require('fs');

            if (!fs.existsSync(pkg.main)) {
              throw new Error('Main export file does not exist: ' + pkg.main);
            }
            if (!fs.existsSync(pkg.types)) {
              throw new Error('Types export file does not exist: ' + pkg.types);
            }
            console.log('✅ Package exports are valid');
          "

  adopter-typechecks:
    name: Adopter Typechecks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Adopter type-check (catch d.ts leaks)
        run: npm run check:adopter-types

      - name: Adopter type-check — narrow per-tool imports (#1944)
        run: npm run check:adopter-types-narrow
        timeout-minutes: 10

  example-typechecks:
    name: Example Typechecks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Typecheck examples
        run: npm run typecheck:examples

      - name: Typecheck skill code samples
        run: npm run typecheck:skill-examples

  typecheck-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    needs:
      - typescript-typecheck
      - library-build
      - adopter-typechecks
      - example-typechecks
    if: ${{ always() }}
    timeout-minutes: 2

    steps:
      - name: Verify typecheck and build lanes
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node - <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const failed = Object.entries(needs).filter(([, job]) => job.result !== 'success');

          if (failed.length > 0) {
            console.error('One or more typecheck/build lanes failed:');
            for (const [name, job] of failed) {
              console.error(`- ${name}: ${job.result}`);
            }
            process.exit(1);
          }

          console.log('All typecheck/build lanes passed.');
          NODE

  unit-tests-fast:
    name: Unit Tests Fast (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/3', '2/3', '3/3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Run fast unit test shard
        run: node scripts/run-test-with-summary.js --title "Unit Tests Fast $TEST_SHARD" -- npm run test:node:fast:shard
        env:
          CI: true
          TEST_SHARD: ${{ matrix.shard }}

  unit-tests-slow:
    name: Unit Tests Slow
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Run slow unit tests
        run: node scripts/run-test-with-summary.js --title "Unit Tests Slow" -- npm run test:node:slow
        env:
          CI: true

  eslint-plugin-tests:
    name: ESLint Plugin Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Run ESLint plugin tests
        run: node scripts/run-test-with-summary.js --title "ESLint Plugin Tests" -- npm test --workspace=packages/eslint-plugin --if-present
        env:
          CI: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs:
      - unit-tests-fast
      - unit-tests-slow
      - eslint-plugin-tests
    if: ${{ always() }}
    timeout-minutes: 2

    steps:
      - name: Verify unit test lanes
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node - <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const failed = Object.entries(needs).filter(([, job]) => job.result !== 'success');

          if (failed.length > 0) {
            console.error('One or more unit test lanes failed:');
            for (const [name, job] of failed) {
              console.error(`- ${name}: ${job.result}`);
            }
            process.exit(1);
          }

          console.log('All unit test lanes passed.');
          NODE

  example-integration-tests:
    name: Example Adapter Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run example adapter integration tests
        run: npm run test:examples
        env:
          CI: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: |
          npm audit || true

          if npm audit --audit-level=high 2>/dev/null; then
            echo "✅ No high or critical vulnerabilities found"
          else
            echo "❌ High or critical vulnerabilities found"
            npm audit --audit-level=high
            exit 1
          fi

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    needs:
      - generated-checks
      - typecheck-build
      - unit-tests
      - example-integration-tests
      - security-audit
    if: ${{ always() }}
    timeout-minutes: 2

    steps:
      - name: Verify CI lanes
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node - <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const failed = Object.entries(needs).filter(([, job]) => job.result !== 'success');

          if (failed.length > 0) {
            console.error('One or more CI lanes failed:');
            for (const [name, job] of failed) {
              console.error(`- ${name}: ${job.result}`);
            }
            process.exit(1);
          }

          console.log('All CI lanes passed.');
          NODE
