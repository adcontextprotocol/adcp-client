name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  reference-seller-interop:
    name: Reference seller interop
    permissions:
      contents: read
    uses: ./.github/workflows/interop-python.yml

  release:
    name: Release
    needs: reference-seller-interop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Mint an AAO IPR Bot installation token so events created by this
      # workflow (the release-PR branch push and the "chore: release package"
      # PR itself) trigger downstream workflows. GitHub suppresses workflow
      # triggers for events authored by the default GITHUB_TOKEN, which left
      # the release PR permanently BLOCKED on the pull_request_target-based
      # `IPR Policy / Signature` required check — it never fired, so only an
      # admin bypass could merge. An App identity's events are not suppressed.
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.IPR_APP_ID }}
          private-key: ${{ secrets.IPR_APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build:lib

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          title: 'chore: release package'
          commit: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      # `npm deprecate '@adcp/client@…'` is run manually post-release for now.
      # OIDC trusted-publishing tokens are scoped to the publishing package, so
      # the token issued for @adcp/sdk's publish does not have deprecate rights
      # on @adcp/client. Once we provision a maintainer NPM_TOKEN secret with
      # deprecate scope on @adcp/client, this step can land back here. See the
      # PR description for the manual-deprecate snippet to run after release.
