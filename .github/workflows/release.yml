name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build:lib

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: 'chore: release package'
          commit: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Surface the rename to anyone still installing under the old name.
      # Without this step the `keywords: ["deprecated"]` and shim README do
      # nothing visible at install time — npm only emits the deprecation
      # warning when the version is registered as deprecated on the registry.
      # We deprecate each shim version as it ships (the version is linked to
      # @adcp/sdk via .changeset/config.json's `linked` config, so the values
      # match). The shim still publishes and still works — `npm install` just
      # prints the rename pointer alongside.
      - name: Deprecate @adcp/client (rename notice)
        if: steps.changesets.outputs.published == 'true'
        run: |
          SHIM_VERSION=$(node -p "require('./packages/client-shim/package.json').version")
          npm deprecate "@adcp/client@$SHIM_VERSION" \
            "Renamed to @adcp/sdk. Replace '@adcp/client' with '@adcp/sdk' in your imports — APIs are identical. See https://www.npmjs.com/package/@adcp/sdk."
