name: Release

on:
  push:
    branches:
      - main
      - backport-2114-adcp-3.0

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build:lib

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: 'chore: release package'
          commit: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Update AdCP 3.0 npm dist-tag
        if: github.ref_name == 'backport-2114-adcp-3.0'
        run: |
          unset NODE_AUTH_TOKEN NPM_CONFIG_USERCONFIG
          npm dist-tag add "@adcp/sdk@$(node -p "require('./package.json').version")" adcp-3.0

      # `npm deprecate '@adcp/client@…'` is run manually post-release for now.
      # OIDC trusted-publishing tokens are scoped to the publishing package, so
      # the token issued for @adcp/sdk's publish does not have deprecate rights
      # on @adcp/client. Once we provision a maintainer NPM_TOKEN secret with
      # deprecate scope on @adcp/client, this step can land back here. See the
      # PR description for the manual-deprecate snippet to run after release.
