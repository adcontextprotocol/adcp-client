name: Secretariat dist check

# Backstops the local pre-commit dist-rebuild hook: verifies each node action's
# committed dist/ bundle is in sync with its source. Plain build + git-diff, no
# secrets — runs on the PR head under the ordinary pull_request trigger.

on:
  pull_request:
    paths:
      - '.secretariat/ai-review/setup/**'
      - '.secretariat/ai-review/arbiter/**'

# Read-only: this job only checks out, builds, and diffs. No token writes.
permissions:
  contents: read

jobs:
  dist-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify committed dist/ matches source
        run: bash .secretariat/ai-review/scripts/check-dist.sh
