name: 'AAO-SECRETARIAT v2 — Review (Orchestrator)'
description: 'Runs the AAO-SECRETARIAT v2 review flow: setup → reviewer → arbiter.'
author: 'Ad Context Protocol'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  client-id:
    description: 'GitHub App client ID for the AAO-SECRETARIAT app'
    required: false
  app-id:
    description: 'GitHub App ID for the AAO-SECRETARIAT app'
    required: false
    deprecationMessage: 'Use client-id instead'
  app-private-key:
    description: 'GitHub App private key for the AAO-SECRETARIAT app'
    required: true
  model:
    description: 'Claude model (default claude-sonnet-4-6)'
    required: false
    default: 'claude-sonnet-4-6'
  reviewer-max-turns:
    description: 'Max agentic turns for the reviewer'
    required: false
    default: '60'
  protected-branches:
    description: 'Override AAO-SECRETARIAT.md ## Protected Branches'
    required: false
    default: ''
  no-auto-approve-teams:
    description: 'Override AAO-SECRETARIAT.md ## No-Auto-Approve Teams'
    required: false
    default: ''
  escalation-reviewers:
    description: 'Override AAO-SECRETARIAT.md ## Escalation Reviewers (comma-separated users and/or org/team-slug)'
    required: false
    default: ''
  high-risk-paths:
    description: 'Override AAO-SECRETARIAT.md ## High-Risk Paths'
    required: false
    default: ''
  gated-paths:
    description: 'Override AAO-SECRETARIAT.md ## Gated Paths'
    required: false
    default: ''
  trivial-paths:
    description: 'Override AAO-SECRETARIAT.md ## Trivial Paths'
    required: false
    default: ''
  release-stack-branches:
    description: 'Override AAO-SECRETARIAT.md ## Release Stack Branches'
    required: false
    default: 'release/next'
  skip-bot-authors:
    description: 'Override AAO-SECRETARIAT.md ## Skip Bot Authors'
    required: false
    default: 'dependabot[bot],renovate[bot],github-actions[bot]'
  force-review-label:
    description: 'Label that forces review on draft PRs'
    required: false
    default: 'aao-secretariat/force-review'

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ -z "${{ inputs.client-id }}" && -z "${{ inputs.app-id }}" ]]; then
          echo "::error::Either 'client-id' or 'app-id' must be provided"
          exit 1
        fi

    - name: Mint AAO-SECRETARIAT App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client-id || inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Setup
      id: setup
      uses: ./.github/aao-secretariat/setup
      with:
        github-token: ${{ steps.app-token.outputs.token }}
        aao-secretariat-bot-login: ${{ steps.app-token.outputs.app-slug }}[bot]
        protected-branches: ${{ inputs.protected-branches }}
        no-auto-approve-teams: ${{ inputs.no-auto-approve-teams }}
        escalation-reviewers: ${{ inputs.escalation-reviewers }}
        high-risk-paths: ${{ inputs.high-risk-paths }}
        gated-paths: ${{ inputs.gated-paths }}
        trivial-paths: ${{ inputs.trivial-paths }}
        release-stack-branches: ${{ inputs.release-stack-branches }}
        skip-bot-authors: ${{ inputs.skip-bot-authors }}
        force-review-label: ${{ inputs.force-review-label }}

    - name: Skip notice
      if: steps.setup.outputs.should-run != 'true'
      shell: bash
      run: |
        echo "AAO-SECRETARIAT v2 skipped: ${{ steps.setup.outputs.skip-reason }}"
        echo "should-run=false skip-reason=${{ steps.setup.outputs.skip-reason }}" >> "$GITHUB_STEP_SUMMARY"

    - name: Reviewer
      if: steps.setup.outputs.should-run == 'true'
      id: reviewer
      uses: ./.github/aao-secretariat/reviewer
      with:
        anthropic-api-key: ${{ inputs.anthropic-api-key }}
        github-token: ${{ steps.app-token.outputs.token }}
        pr-number: ${{ steps.setup.outputs.pr-number }}
        head-sha: ${{ steps.setup.outputs.head-sha }}
        base-sha: ${{ steps.setup.outputs.base-sha }}
        diff-delta-path: ${{ steps.setup.outputs.diff-delta-path }}
        diff-full-path: ${{ steps.setup.outputs.diff-full-path }}
        aao-secretariat-md-body: ${{ steps.setup.outputs.aao-secretariat-md-body }}
        prior-decision: ${{ steps.setup.outputs.prior-decision }}
        gated-paths: ${{ steps.setup.outputs.gated-paths }}
        gated-paths-reasons: ${{ steps.setup.outputs.gated-paths-reasons }}
        review-decision: ${{ steps.setup.outputs.review-decision }}
        model: ${{ inputs.model }}
        max-turns: ${{ inputs.reviewer-max-turns }}

    - name: Arbiter
      if: steps.setup.outputs.should-run == 'true'
      id: arbiter
      uses: ./.github/aao-secretariat/arbiter
      with:
        anthropic-api-key: ${{ inputs.anthropic-api-key }}
        github-token: ${{ steps.app-token.outputs.token }}
        findings-json: ${{ steps.reviewer.outputs.findings-json }}
        aao-secretariat-md-body: ${{ steps.setup.outputs.aao-secretariat-md-body }}
        high-risk: ${{ steps.setup.outputs.high-risk }}
        high-risk-reasons: ${{ steps.setup.outputs.high-risk-reasons }}
        gated-paths: ${{ steps.setup.outputs.gated-paths }}
        gated-paths-reasons: ${{ steps.setup.outputs.gated-paths-reasons }}
        review-decision: ${{ steps.setup.outputs.review-decision }}
        escalation-reviewers: ${{ steps.setup.outputs.escalation-reviewers }}
        no-auto-approve-teams: ${{ steps.setup.outputs.no-auto-approve-teams }}
        protected-branches: ${{ steps.setup.outputs.protected-branches }}
        prior-decision: ${{ steps.setup.outputs.prior-decision }}
        pr-number: ${{ steps.setup.outputs.pr-number }}
        head-sha: ${{ steps.setup.outputs.head-sha }}
        base-sha: ${{ steps.setup.outputs.base-sha }}
        diff-full-path: ${{ steps.setup.outputs.diff-full-path }}
        model: ${{ inputs.model }}

branding:
  icon: 'eye'
  color: 'blue'
