name: 'AAO-SECRETARIAT v2 — Reviewer'
description: 'Calls anthropics/claude-code-action with the AAO-SECRETARIAT rule set, emits findings as JSON.'
author: 'Ad Context Protocol'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  github-token:
    description: 'GitHub App installation token (AAO-SECRETARIAT app)'
    required: true
  pr-number:
    description: 'PR number (from setup output)'
    required: true
  head-sha:
    description: 'Head SHA (from setup output)'
    required: true
  base-sha:
    description: 'Base SHA (from setup output)'
    required: true
  diff-delta-path:
    description: 'Path to delta diff (from setup output)'
    required: true
  diff-full-path:
    description: 'Path to full diff (from setup output)'
    required: true
  aao-secretariat-md-body:
    description: 'Repo Context section of AAO-SECRETARIAT.md (from setup output)'
    required: false
    default: ''
  prior-decision:
    description: 'Prior decision JSON from setup (empty string on first pass)'
    required: false
    default: ''
  gated-paths:
    description: '"true" if setup flagged gated paths (from setup output)'
    required: false
    default: 'false'
  gated-paths-reasons:
    description: 'JSON array of gated-path reasons (from setup output)'
    required: false
    default: '[]'
  review-decision:
    description: 'Raw GitHub reviewDecision (APPROVED | CHANGES_REQUESTED | REVIEW_REQUIRED | "") (from setup output)'
    required: false
    default: ''
  model:
    description: 'Claude model'
    required: false
    default: 'claude-sonnet-4-6'
  max-turns:
    description: 'Maximum agentic turns for the reviewer'
    required: false
    default: '60'

outputs:
  findings-json:
    description: 'Structured findings JSON conforming to reviewer/findings-schema.json'
    value: ${{ steps.findings.outputs.findings-json }}
  execution-file:
    description: 'Path to the claude-code-action execution file (for debugging)'
    value: ${{ steps.claude.outputs.execution_file }}

runs:
  using: 'composite'
  steps:
    - name: Assemble prompt
      id: prompt
      shell: bash
      env:
        AAO_SECRETARIAT_MD_BODY: ${{ inputs.aao-secretariat-md-body }}
        PRIOR_DECISION: ${{ inputs.prior-decision }}
        GATED_PATHS: ${{ inputs.gated-paths }}
        GATED_PATHS_REASONS: ${{ inputs.gated-paths-reasons }}
        REVIEW_DECISION: ${{ inputs.review-decision }}
        PR_NUMBER: ${{ inputs.pr-number }}
        REPO: ${{ github.repository }}
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
        DELTA_PATH: ${{ inputs.diff-delta-path }}
        FULL_PATH: ${{ inputs.diff-full-path }}
      run: |
        set -euo pipefail
        RULES="${{ github.action_path }}/rules"
        FINDINGS_PATH="${RUNNER_TEMP}/aao-secretariat-findings.json"
        PROMPT_PATH="${RUNNER_TEMP}/aao-secretariat-prompt.md"

        # The WG constitution lives in the spec repo, not here. Fetch it from
        # adcp@main at review time — the PR under review cannot mutate the rules
        # it is judged under. Fail-open: if the fetch fails, the review runs
        # without it.
        CONSTITUTION="$(curl -sf https://raw.githubusercontent.com/adcontextprotocol/adcp/main/.agents/wg/constitution.md || true)"

        {
          cat "${RULES}/voice.md"
          printf '\n\n'
          cat "${RULES}/severity.md"
          printf '\n\n'
          cat "${RULES}/inline-comments.md"
          printf '\n\n'
          cat "${RULES}/coverage.md"
          printf '\n\n'
          cat "${RULES}/governance-gates.md"
          if [[ -n "${CONSTITUTION}" ]]; then
            printf '\n\n---\n\n## WG constitution (from adcontextprotocol/adcp@main)\n\n'
            printf '%s\n' "${CONSTITUTION}"
          fi
          if [[ "${GATED_PATHS}" == "true" ]]; then
            printf '\n\n# Gated paths matched (informational — do not comment on this fact)\n\n'
            printf 'The following changed files matched a `## Gated Paths` glob. Per governance-gates.md, do NOT post an inline comment or findings-JSON entry about this fact — the arbiter handles it.\n\n'
            echo "${GATED_PATHS_REASONS}" | jq -r '.[] | "- \(.)"'
          fi
          printf '\n\nRequired Review Status (informational only): %s\n' "${REVIEW_DECISION:-unknown}"
          if [[ -n "${AAO_SECRETARIAT_MD_BODY}" ]]; then
            printf '\n\n# Repo-specific context\n\n'
            printf '%s\n' "${AAO_SECRETARIAT_MD_BODY}"
          fi
          if [[ -n "${PRIOR_DECISION}" ]]; then
            PRIOR_OUTCOME=$(echo "${PRIOR_DECISION}" | jq -r '.outcome')
            PRIOR_HEAD=$(echo "${PRIOR_DECISION}" | jq -r '.head')
            FINDING_COUNT=$(echo "${PRIOR_DECISION}" | jq -r 'if .findings then (.findings | length) else 0 end')
            printf '\n\n# Subsequent review pass\n\n'
            printf 'This is not the first AAO-SECRETARIAT review of this PR. Prior outcome: **%s** (SHA: %s).\n\n' "${PRIOR_OUTCOME}" "${PRIOR_HEAD}"
            if [[ "${FINDING_COUNT}" -gt 0 ]]; then
              printf 'Prior findings (%s):\n' "${FINDING_COUNT}"
              echo "${PRIOR_DECISION}" | jq -r '.findings[]? | "- [\(.severity)] \(.file)\(if .line then ":\(.line | tostring)" else "" end) — \(.title)"'
            else
              printf 'Prior findings: none (clean pass).\n'
            fi
            printf '\n## Scope rules for this pass\n\n'
            printf '1. **New findings must come from delta files only.** The constrained delta diff lists the files changed since the prior review. Surface new findings ONLY in those files. Do not use the full diff to hunt for issues in files absent from the delta — the full diff is for understanding context of delta changes, not for expanding your review surface.\n\n'
            printf '2. **Prior findings:** for each finding listed above, check whether its file is in the delta AND whether the issue persists. If the file is not in the delta, skip it — do not re-raise it. If the file IS in the delta and the issue is still present, you may re-surface it.\n\n'
            printf '3. **Largest-file rule applies to delta files only on this pass,** not to the full diff.\n'
          fi
          printf '\n\n# Your task — review PR #%s in %s\n\n' "${PR_NUMBER}" "${REPO}"
          printf 'Base SHA: %s\nHead SHA: %s\n\n' "${BASE_SHA}" "${HEAD_SHA}"
          printf 'The constrained delta diff (what changed since the prior review, intersected with the current PR surface, with trivial paths removed) is at:\n  %s\n\n' "${DELTA_PATH}"
          printf 'The full PR diff (use only when you need broader context) is at:\n  %s\n\n' "${FULL_PATH}"
          printf 'Procedure:\n'
          printf '1. Read the delta diff first. Understand what changed.\n'
          printf '2. Pull the full diff only when delta context is insufficient.\n'
          printf '3. Use `gh pr view` and `gh pr diff` as needed. The checked-out workspace is pinned to the BASE SHA (%s): `Read`/`Glob`/`Grep` there show the OLD version of changed files, so treat them as base-only context, not as a way to see the actual changes (the delta and full diff files already carry those). To read the CHANGED (head, %s) version of a specific file, run: `gh api "repos/%s/contents/<path>?ref=%s" -H "Accept: application/vnd.github.raw"`.\n' "${BASE_SHA}" "${HEAD_SHA}" "${REPO}" "${HEAD_SHA}"
          printf '4. Post one inline comment per finding via `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) following the inline-comment rules above.\n'
          printf '5. **At end-of-run, write the findings JSON to `%s` using the `Write` tool.** The JSON MUST conform to this schema:\n\n' "${FINDINGS_PATH}"
          printf '```json\n'
          cat "${{ github.action_path }}/findings-schema.json"
          printf '\n```\n\n'
          printf 'Do NOT post a top-level PR review. Do NOT call `gh pr review`. The arbiter step handles the overall verdict.\n'
        } > "${PROMPT_PATH}"

        {
          echo "prompt<<__AAO_SECRETARIAT_PROMPT_EOF__"
          cat "${PROMPT_PATH}"
          echo "__AAO_SECRETARIAT_PROMPT_EOF__"
          echo "findings-path=${FINDINGS_PATH}"
        } >> "${GITHUB_OUTPUT}"

    - name: Claude Code review
      id: claude
      uses: anthropics/claude-code-action@v1
      env:
        CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: '0'
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        github_token: ${{ inputs.github-token }}
        allowed_non_write_users: fgranata
        prompt: ${{ steps.prompt.outputs.prompt }}
        claude_args: |
          --model ${{ inputs.model }}
          --max-turns ${{ inputs.max-turns }}
          --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api repos/*/issues/*:*),Bash(gh api repos/*/contents/*:*),Read,Write,Glob,Grep"

    - name: Read findings JSON
      id: findings
      shell: bash
      run: |
        set -euo pipefail
        FINDINGS_PATH="${{ steps.prompt.outputs.findings-path }}"

        if [[ ! -f "${FINDINGS_PATH}" ]]; then
          echo "::error::Reviewer did not write a findings file at ${FINDINGS_PATH}. The arbiter cannot run without structured findings. Failing the job so a human investigates rather than auto-approving on empty input."
          exit 1
        fi

        if ! jq empty "${FINDINGS_PATH}" >/dev/null 2>&1; then
          echo "::error::Findings file at ${FINDINGS_PATH} is not valid JSON."
          echo "First 500 bytes:"
          head -c 500 "${FINDINGS_PATH}" || true
          exit 1
        fi

        {
          echo "findings-json<<__AAO_SECRETARIAT_FINDINGS_EOF__"
          cat "${FINDINGS_PATH}"
          echo "__AAO_SECRETARIAT_FINDINGS_EOF__"
        } >> "${GITHUB_OUTPUT}"

branding:
  icon: 'search'
  color: 'blue'
