name: 'AAO-SECRETARIAT v2 — Setup'
description: 'Parses AAO-SECRETARIAT.md, computes diff/delta, evaluates short-circuit conditions for the AAO-SECRETARIAT v2 review flow.'
author: 'Ad Context Protocol'

inputs:
  github-token:
    description: 'GitHub App installation token'
    required: true
  aao-secretariat-bot-login:
    description: 'GitHub login of the AAO-SECRETARIAT bot user (e.g. "aao-secretariat[bot]"). The orchestrator/self-review workflow constructs this from actions/create-github-app-token@v3''s app-slug output.'
    required: false
    default: 'aao-secretariat[bot]'
  protected-branches:
    description: 'Comma-separated base branches that force comment-only outcome (overrides AAO-SECRETARIAT.md ## Protected Branches)'
    required: false
    default: ''
  no-auto-approve-teams:
    description: 'Comma-separated team slugs whose members hold for human review (overrides AAO-SECRETARIAT.md)'
    required: false
    default: ''
  escalation-reviewers:
    description: 'Comma-separated GitHub logins (user) or org/slug (team) to request when arbiter escalates (overrides AAO-SECRETARIAT.md)'
    required: false
    default: ''
  high-risk-paths:
    description: 'Comma-separated globs treated as high-risk (overrides AAO-SECRETARIAT.md)'
    required: false
    default: ''
  gated-paths:
    description: 'Comma-separated globs requiring mandatory human/CODEOWNERS sign-off before approval (overrides AAO-SECRETARIAT.md ## Gated Paths)'
    required: false
    default: ''
  trivial-paths:
    description: 'Comma-separated globs filtered from incremental delta (overrides AAO-SECRETARIAT.md)'
    required: false
    default: ''
  release-stack-branches:
    description: 'Comma-separated branches that, as PR head, skip review entirely (overrides AAO-SECRETARIAT.md)'
    required: false
    default: 'release/next'
  skip-bot-authors:
    description: 'Comma-separated bot logins to skip (overrides AAO-SECRETARIAT.md)'
    required: false
    default: 'dependabot[bot],renovate[bot],github-actions[bot]'
  force-review-label:
    description: 'Label that forces review even on draft PRs'
    required: false
    default: 'aao-secretariat/force-review'

outputs:
  should-run:
    description: 'true if downstream reviewer + arbiter should run'
  skip-reason:
    description: 'When should-run=false, one of: pr-closed, pr-draft, bot-author, merge-conflicts, release-stack-branch, self-triggered, pure-rebase, empty-delta'
  aao-secretariat-md-body:
    description: 'Repo Context section of AAO-SECRETARIAT.md (for prompt injection)'
  high-risk:
    description: 'true if any changed file matched a high-risk glob'
  high-risk-reasons:
    description: 'JSON array of human-readable reasons (filename + change kind + matching glob)'
  gated-paths:
    description: 'true if any changed file matched a glob in ## Gated Paths'
  gated-paths-reasons:
    description: 'JSON array of human-readable reasons (filename + change kind + matching glob) for gated-paths matches'
  review-decision:
    description: 'Raw GitHub reviewDecision for this PR: APPROVED | CHANGES_REQUESTED | REVIEW_REQUIRED | "" (null/unknown/fetch-failed)'
  escalation-reviewers:
    description: 'Resolved escalation reviewers (comma-separated; users and/or org/team-slug)'
  no-auto-approve-teams:
    description: 'Resolved no-auto-approve team slugs (comma-separated)'
  protected-branches:
    description: 'Resolved protected branches (comma-separated)'
  prior-decision:
    description: 'JSON-serialized prior decision marker (or empty string if none)'
  diff-full-path:
    description: 'Path to the full PR diff file in $RUNNER_TEMP'
  diff-delta-path:
    description: 'Path to the delta diff file in $RUNNER_TEMP (equals diff-full-path when not a synchronize event)'
  pr-number:
    description: 'PR number'
  head-sha:
    description: 'Head SHA'
  base-sha:
    description: 'Base SHA'

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'blue'
