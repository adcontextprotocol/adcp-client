id: collection_governance
version: "1.0.0"
title: "Collection list governance and targeting"
category: collection_governance
summary: "Manage collection lists — create, update, query, delete — and target media buys by collection membership."
track: governance
required_tools:
  - create_collection_list

narrative: |
  You run an agent that manages collection lists. Collections are programs, shows, franchises,
  or other content groupings identified across publishers via distribution IDs (imdb_id,
  gracenote_id, eidr_id) or by publisher-specific collection IDs declared in adagents.json.

  Buyers build collection lists to target inventory by content. A list says "run my campaign
  only on these shows" or "exclude this franchise entirely." Once the list exists, buyers
  reference it from package targeting via collection_list or collection_list_exclude — the
  seller intersects matched collections with the referenced list when serving.

  This storyboard covers the full lifecycle: create a list from distribution IDs and
  publisher collections, list and retrieve it, update the base collections, use it in a
  media buy, and delete it. The collection list agent may also emit collection_list_changed
  webhooks when resolved collections change; webhook delivery is covered inline.

agent:
  interaction_model: governance_agent
  capabilities:
    - collection_governance
  examples:
    - "Content metadata services"
    - "SSPs that expose program-level inventory"
    - "Governance platforms with collection lists"

caller:
  role: buyer_agent
  example: "Pinnacle Agency (buyer)"

prerequisites:
  description: |
    The caller needs a brand identity and knowledge of collection identifiers
    (distribution_ids or publisher collection IDs) to build a list.
  test_kit: "test-kits/acme-outdoor.yaml"

phases:
  - id: capability_discovery
    title: "Capability discovery"
    narrative: |
      The buyer calls get_adcp_capabilities to confirm the agent supports collection list
      governance before creating lists.

    steps:
      - id: get_capabilities
        title: "Check agent capabilities"
        narrative: |
          Verify that the agent declares collection list support before proceeding.
        task: get_adcp_capabilities
        schema_ref: "protocol/get-adcp-capabilities-request.json"
        response_schema_ref: "protocol/get-adcp-capabilities-response.json"
        doc_ref: "/protocol/get_adcp_capabilities"
        comply_scenario: capability_discovery
        stateful: false
        expected: |
          Return capabilities declaring governance in supported_protocols and a
          collection_lists feature flag.
        sample_request:
          context:
            correlation_id: "collection_governance--get_capabilities"
        validations:
          - check: response_schema
            description: "Response matches get-adcp-capabilities-response.json schema"
          - check: field_present
            path: "supported_protocols"
            description: "Agent declares supported protocols"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--get_capabilities"
            description: "Context correlation_id returned unchanged"

  - id: create_list
    title: "Create a collection list"
    narrative: |
      The buyer creates a collection list combining distribution_ids (platform-independent)
      and publisher_collections (publisher-specific). The list resolves to a concrete set of
      collections that the agent will keep synced.

    steps:
      - id: create_collection_list
        title: "Create an inclusion collection list"
        narrative: |
          The buyer creates a list defining the programs and franchises to target. Sources
          combine distribution IDs (imdb_id, gracenote_id) with publisher-specific
          collection IDs. The agent resolves and stores the list, issuing a list_id.
        task: create_collection_list
        schema_ref: "governance/create-collection-list-request.json"
        response_schema_ref: "governance/create-collection-list-response.json"
        doc_ref: "/governance/campaign/tasks/collection_lists"
        comply_scenario: governance_collection_lists
        stateful: true
        expected: |
          Return the created list:
          - list_id: platform-assigned identifier
          - name, description
          - Resolved collections with identification metadata
          - cache_valid_until for consumers to refresh

        sample_request:
          adcp_major_version: 3
          brand:
            domain: "acmeoutdoor.example"
          name: "Acme Outdoor target programs Q2"
          description: "Outdoor lifestyle programming for Q2 lifestyle campaign"
          base_collections:
            - selection_type: "distribution_ids"
              identifiers:
                - type: "imdb_id"
                  value: "tt0094951"
                - type: "imdb_id"
                  value: "tt0123456"
            - selection_type: "publisher_collections"
              publisher_domain: "outdoortv.example"
              collection_ids:
                - "trail-life-series"
                - "backcountry-gear"
          idempotency_key: "collection-list-acme-q2-v1"

          context:
            correlation_id: "collection_governance--create_collection_list"
        context_outputs:
          - path: "list.list_id"
            key: "collection_list_id"

        validations:
          - check: response_schema
            description: "Response matches create-collection-list-response.json schema"
          - check: field_present
            path: "list.list_id"
            description: "Agent assigns list_id — must be echoed in get/update/delete"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--create_collection_list"
            description: "Context correlation_id returned unchanged"

  - id: list_and_get
    title: "Query collection lists"
    narrative: |
      The buyer lists all collection lists for the account and retrieves the specific list
      to inspect the resolved collections.

    steps:
      - id: list_collection_lists
        title: "List all collection lists"
        narrative: |
          Return summaries of all collection lists for the brand. The response includes
          list metadata without resolving collections.
        task: list_collection_lists
        schema_ref: "governance/list-collection-lists-request.json"
        response_schema_ref: "governance/list-collection-lists-response.json"
        doc_ref: "/governance/campaign/tasks/collection_lists"
        comply_scenario: governance_collection_lists
        stateful: true
        expected: |
          Return an array of collection list summaries (list_id, name, collection_count).

        sample_request:
          principal: "acmeoutdoor.example"
          name_contains: "Acme Outdoor"

          context:
            correlation_id: "collection_governance--list_collection_lists"
        validations:
          - check: response_schema
            description: "Response matches list-collection-lists-response.json schema"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--list_collection_lists"
            description: "Context correlation_id returned unchanged"

      - id: get_collection_list
        title: "Get collection list with resolved collections"
        narrative: |
          The buyer retrieves the full list and resolves collections for inspection. The
          agent returns each resolved collection with identifier metadata and validity.
        task: get_collection_list
        schema_ref: "governance/get-collection-list-request.json"
        response_schema_ref: "governance/get-collection-list-response.json"
        doc_ref: "/governance/campaign/tasks/collection_lists"
        comply_scenario: governance_collection_lists
        stateful: true
        expected: |
          Return the full list including resolved collections and cache_valid_until.

        sample_request:
          list_id: "$context.collection_list_id"
          resolve: true

          context:
            correlation_id: "collection_governance--get_collection_list"
        validations:
          - check: response_schema
            description: "Response matches get-collection-list-response.json schema"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--get_collection_list"
            description: "Context correlation_id returned unchanged"

  - id: update_list
    title: "Update collection list"
    narrative: |
      The buyer modifies the base collections on the list. Updates trigger re-resolution
      and may emit a collection_list_changed webhook to registered consumers.

    steps:
      - id: update_collection_list
        title: "Update base collections"
        narrative: |
          Replace the list's base collections with a new set. The agent re-resolves and
          returns the updated list. Registered webhook consumers receive a
          collection_list_changed event.
        task: update_collection_list
        schema_ref: "governance/update-collection-list-request.json"
        response_schema_ref: "governance/update-collection-list-response.json"
        doc_ref: "/governance/campaign/tasks/collection_lists"
        comply_scenario: governance_collection_lists
        stateful: true
        expected: |
          Return the updated list with new base_collections resolved.

        sample_request:
          list_id: "$context.collection_list_id"
          brand:
            domain: "acmeoutdoor.example"
          base_collections:
            - selection_type: "distribution_ids"
              identifiers:
                - type: "imdb_id"
                  value: "tt0094951"
                - type: "imdb_id"
                  value: "tt0987654"
            - selection_type: "publisher_genres"
              publisher_domain: "outdoortv.example"
              genres: ["adventure", "nature-documentary"]
              genre_taxonomy: "iab_v3"
          webhook_url: "https://pinnacle-agency.example/webhooks/collection-list"

          context:
            correlation_id: "collection_governance--update_collection_list"
        validations:
          - check: response_schema
            description: "Response matches update-collection-list-response.json schema"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--update_collection_list"
            description: "Context correlation_id returned unchanged"

  - id: targeting_usage
    title: "Reference the collection list in media buy targeting"
    narrative: |
      Once the list exists, buyers reference it from a seller's package targeting via
      collection_list (inclusion) or collection_list_exclude (exclusion). This phase
      demonstrates the cross-agent binding: the seller stores a CollectionListReference
      pointing to this agent's list_id and uses it at serve time.

    steps:
      - id: reference_in_targeting
        title: "Reference the list in create_media_buy targeting"
        narrative: |
          The buyer sends a create_media_buy to a seller with a package that references
          this collection list. This step calls the seller — not the collection list agent —
          and validates that the seller accepts the reference. Skip if no seller is under
          test.
        task: create_media_buy
        schema_ref: "media-buy/create-media-buy-request.json"
        response_schema_ref: "media-buy/create-media-buy-response.json"
        doc_ref: "/media-buy/task-reference/create_media_buy"
        requires_tool: create_media_buy
        stateful: true
        expected: |
          The seller accepts the CollectionListReference in package targeting and returns
          a media_buy_id. No error on the reference itself — the seller may validate
          access to the list asynchronously.

        sample_request:
          brand:
            domain: "acmeoutdoor.example"
          start_time: "2026-05-01T00:00:00Z"
          end_time: "2026-06-30T23:59:59Z"
          packages:
            - product_id: "outdoor_video_q2"
              budget: 15000
              pricing_option_id: "cpm_standard"
              targeting_overlay:
                collection_list:
                  agent_url: "$context.agent_url"
                  list_id: "$context.collection_list_id"

          context:
            correlation_id: "collection_governance--reference_in_targeting"
        validations:
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--reference_in_targeting"
            description: "Context correlation_id returned unchanged"

  - id: delete_list
    title: "Delete the collection list"
    narrative: |
      The buyer deletes the list once the campaign ends. Active media buys referencing the
      list should be handled per the agent's policy (soft delete vs. hard delete).

    steps:
      - id: delete_collection_list
        title: "Delete the collection list"
        narrative: |
          Remove the collection list. Idempotent — repeated calls with the same
          idempotency_key must not error.
        task: delete_collection_list
        schema_ref: "governance/delete-collection-list-request.json"
        response_schema_ref: "governance/delete-collection-list-response.json"
        doc_ref: "/governance/campaign/tasks/collection_lists"
        comply_scenario: governance_collection_lists
        stateful: true
        expected: |
          Acknowledge deletion. The list_id should no longer appear in list_collection_lists.

        sample_request:
          list_id: "$context.collection_list_id"
          idempotency_key: "delete-collection-list-acme-q2-v1"

          context:
            correlation_id: "collection_governance--delete_collection_list"
        validations:
          - check: response_schema
            description: "Response matches delete-collection-list-response.json schema"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "collection_governance--delete_collection_list"
            description: "Context correlation_id returned unchanged"
