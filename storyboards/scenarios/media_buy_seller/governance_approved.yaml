id: media_buy_seller/governance_approved
version: "1.0.0"
title: "Seller creates buy when governance approves"
category: media_buy_seller
summary: "Verifies that the seller creates a media buy when governance approves the transaction."
track: media_buy
required_tools:
  - sync_governance
  - get_products
  - create_media_buy

narrative: |
  When a buyer registers a governance agent and creates a media buy, the seller must call
  the governance agent during buy creation. When governance approves, the buy should
  succeed normally.

  This is a multi-agent test. The test harness acts as the governance agent — it registers
  its own URL via sync_governance, and when the seller calls check_governance during
  create_media_buy, the harness responds with an approved decision. This tests the real
  integration path: the seller actually makes the governance call and handles the response.

  NOTE: This scenario requires the test harness to provide a governance agent endpoint.
  Until that capability exists, this scenario defines the expected behavior but cannot
  be executed automatically.

agent:
  interaction_model: media_buy_seller
  capabilities:
    - sells_media
    - governance_aware
  examples:
    - "Any media buy seller with governance support"

caller:
  role: buyer_agent
  example: "Pinnacle Agency (buyer)"

prerequisites:
  description: |
    The test harness must provide a governance agent endpoint that responds to
    check_governance with an approved decision.
  test_kit: "test-kits/acme-outdoor.yaml"

phases:
  - id: setup
    title: "Account and governance setup"
    steps:
      - id: sync_accounts
        title: "Establish account"
        task: sync_accounts
        schema_ref: "account/sync-accounts-request.json"
        response_schema_ref: "account/sync-accounts-response.json"
        doc_ref: "/accounts/tasks/sync_accounts"
        stateful: true
        expected: |
          Return the account with account_id and status active.
        sample_request:
          accounts:
            - brand:
                domain: "acmeoutdoor.com"
              operator: "pinnacle-agency.com"
              billing: "operator"
              payment_terms: "net_30"
        validations:
          - check: response_schema
            description: "Response matches sync-accounts-response.json schema"
          - check: field_present
            path: "accounts[0].account_id"
            description: "Account has a platform-assigned ID"

      - id: sync_governance
        title: "Register test harness as governance agent"
        narrative: |
          The test harness registers itself as the governance agent. The URL points to
          the harness's governance endpoint, which will respond with an approved decision
          when the seller calls check_governance.
        task: sync_governance
        schema_ref: "account/sync-governance-request.json"
        response_schema_ref: "account/sync-governance-response.json"
        doc_ref: "/accounts/tasks/sync_governance"
        stateful: true
        expected: |
          Acknowledge the governance agent registration.
        sample_request:
          accounts:
            - account:
                brand:
                  domain: "acmeoutdoor.com"
                operator: "pinnacle-agency.com"
              governance_agents:
                - url: "$harness.governance_url"
                  authentication:
                    schemes: ["Bearer"]
                    credentials: "$harness.governance_token"
                  categories: ["budget_authority", "brand_policy"]
        validations:
          - check: response_schema
            description: "Response matches sync-governance-response.json schema"

  - id: buy_with_governance
    title: "Create buy (governance approves)"
    narrative: |
      Discover products and create a media buy. The seller calls check_governance on
      the registered harness URL. The harness responds with approved. The seller
      confirms the buy.

    steps:
      - id: get_products_brief
        title: "Discover products"
        task: get_products
        schema_ref: "media-buy/get-products-request.json"
        response_schema_ref: "media-buy/get-products-response.json"
        doc_ref: "/media-buy/task-reference/get_products"
        comply_scenario: full_sales_flow
        stateful: false
        expected: |
          Return products matching the brief.
        sample_request:
          buying_mode: "brief"
          brief: "Display and video inventory on outdoor lifestyle content. Q2 flight, $25K budget. Adults 25-54, US."
          brand:
            domain: "acmeoutdoor.com"
          account:
            brand:
              domain: "acmeoutdoor.com"
            operator: "pinnacle-agency.com"
        validations:
          - check: response_schema
            description: "Response matches get-products-response.json schema"
          - check: field_present
            path: "products"
            description: "Response contains products"

      - id: create_media_buy
        title: "Create buy (governance approves)"
        task: create_media_buy
        schema_ref: "media-buy/create-media-buy-request.json"
        response_schema_ref: "media-buy/create-media-buy-response.json"
        doc_ref: "/media-buy/task-reference/create_media_buy"
        comply_scenario: create_media_buy
        stateful: true
        expected: |
          The buy succeeds because governance approved:
          - media_buy_id: present
          - status: active or pending_creatives
          - The seller called check_governance and received approved
        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.com"
            operator: "pinnacle-agency.com"
          brand:
            domain: "acmeoutdoor.com"
          start_time: "2026-04-01T00:00:00Z"
          end_time: "2026-06-30T23:59:59Z"
          packages:
            - product_id: "outdoor_display_q2"
              budget: 15000
              pricing_option_id: "cpm_standard"
        validations:
          - check: response_schema
            description: "Response matches create-media-buy-response.json schema"
