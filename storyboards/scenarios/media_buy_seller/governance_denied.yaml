id: media_buy_seller/governance_denied
version: "1.0.0"
title: "Seller rejects buy when governance denies"
category: media_buy_seller
summary: "Verifies that the seller rejects a media buy and propagates the denial when governance denies the transaction."
track: media_buy
required_tools:
  - sync_governance
  - get_products
  - create_media_buy

narrative: |
  This is a multi-agent test. The test harness sets up a strict governance plan on a
  governance agent with a low per-transaction threshold ($10K), then registers that agent
  with the seller. The buyer then attempts a $50K media buy.

  When the seller calls check_governance, the governance agent denies the buy because it
  exceeds the threshold. The seller must reject the buy and propagate the denial back to
  the buyer — it must not override or ignore the governance decision.

  By default, the governance agent is the training agent at test-agent.adcontextprotocol.org.
  Override with --governance-agent-url to use a custom governance agent.

agent:
  interaction_model: media_buy_seller
  capabilities:
    - sells_media
    - governance_aware
  examples:
    - "Any media buy seller with governance support"

caller:
  role: buyer_agent
  example: "Pinnacle Agency (buyer)"

prerequisites:
  description: |
    A governance agent that supports sync_plans and check_governance. The training
    agent is used by default.
  test_kit: "test-kits/acme-outdoor.yaml"

phases:
  - id: governance_plan_setup
    title: "Set up strict governance plan"
    narrative: |
      Create a governance plan on the governance agent with a $10K per-transaction
      limit and no escalation path. Any buy above this amount is denied outright.

    steps:
      - id: sync_plans
        title: "Create strict governance plan"
        task: sync_plans
        schema_ref: "governance/sync-plans-request.json"
        response_schema_ref: "governance/sync-plans-response.json"
        doc_ref: "/governance/campaign/tasks/sync_plans"
        stateful: true
        expected: |
          The governance agent acknowledges the plan with a plan_id.
        sample_request:
          plans:
            - plan_name: "Acme Outdoor strict spending authority"
              brand:
                domain: "acmeoutdoor.com"
              operator: "pinnacle-agency.com"
              authority_level: "agent_limited"
              per_transaction_threshold: 10000
              escalation_path: "none"
        validations:
          - check: response_schema
            description: "Response matches sync-plans-response.json schema"

  - id: seller_setup
    title: "Account and governance registration on seller"
    steps:
      - id: sync_accounts
        title: "Establish account with seller"
        task: sync_accounts
        schema_ref: "account/sync-accounts-request.json"
        response_schema_ref: "account/sync-accounts-response.json"
        doc_ref: "/accounts/tasks/sync_accounts"
        stateful: true
        expected: |
          Return the account with account_id and status active.
        sample_request:
          accounts:
            - brand:
                domain: "acmeoutdoor.com"
              operator: "pinnacle-agency.com"
              billing: "operator"
              payment_terms: "net_30"
        validations:
          - check: response_schema
            description: "Response matches sync-accounts-response.json schema"
          - check: field_present
            path: "accounts[0].account_id"
            description: "Account has a platform-assigned ID"

      - id: sync_governance
        title: "Register governance agent with seller"
        narrative: |
          Register the governance agent URL with the seller. The seller will call
          check_governance on this URL during create_media_buy.
        task: sync_governance
        schema_ref: "account/sync-governance-request.json"
        response_schema_ref: "account/sync-governance-response.json"
        doc_ref: "/accounts/tasks/sync_governance"
        stateful: true
        expected: |
          Acknowledge the governance agent registration.
        sample_request:
          accounts:
            - account:
                brand:
                  domain: "acmeoutdoor.com"
                operator: "pinnacle-agency.com"
              governance_agents:
                - url: "$context.governance_agent_url"
                  categories: ["budget_authority", "brand_policy"]
        validations:
          - check: response_schema
            description: "Response matches sync-governance-response.json schema"

  - id: buy_denied
    title: "Create buy exceeding governance limits"
    narrative: |
      Send a brief and attempt a $50K buy against a $10K governance limit. The governance
      agent denies the buy. The seller must reject it and propagate the denial.

    steps:
      - id: get_products_brief
        title: "Discover products"
        task: get_products
        schema_ref: "media-buy/get-products-request.json"
        response_schema_ref: "media-buy/get-products-response.json"
        doc_ref: "/media-buy/task-reference/get_products"
        comply_scenario: full_sales_flow
        stateful: false
        expected: |
          Return products matching the brief.
        sample_request:
          buying_mode: "brief"
          brief: "Premium video and display on outdoor lifestyle. Q2 flight, $50K budget. Adults 25-54, US."
          brand:
            domain: "acmeoutdoor.com"
          account:
            brand:
              domain: "acmeoutdoor.com"
            operator: "pinnacle-agency.com"
        validations:
          - check: response_schema
            description: "Response matches get-products-response.json schema"
          - check: field_present
            path: "products"
            description: "Response contains products"

      - id: create_media_buy_denied
        title: "Create buy (governance denies — should fail)"
        task: create_media_buy
        schema_ref: "media-buy/create-media-buy-request.json"
        response_schema_ref: "media-buy/create-media-buy-response.json"
        doc_ref: "/media-buy/task-reference/create_media_buy"
        comply_scenario: create_media_buy
        stateful: true
        expect_error: true
        expected: |
          The buy is rejected because governance denied the transaction — the $50K
          buy exceeds the plan's $10K per-transaction threshold. The seller propagates
          the denial to the buyer with the governance findings.
        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.com"
            operator: "pinnacle-agency.com"
          brand:
            domain: "acmeoutdoor.com"
          start_time: "2026-04-01T00:00:00Z"
          end_time: "2026-06-30T23:59:59Z"
          packages:
            - product_id: "outdoor_display_q2"
              budget: 30000
              pricing_option_id: "cpm_standard"
            - product_id: "outdoor_video_q2"
              budget: 20000
              pricing_option_id: "cpm_standard"
        validations:
          - check: error_code
            value: "GOVERNANCE_DENIED"
            description: "Error code indicates governance denial"
