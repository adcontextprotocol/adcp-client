                domain:
                  type: string
                  example: examplepub.com
                  description: Publisher domain to re-crawl
              required:
                - domain
      responses:
        "202":
          description: Crawl request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    enum:
                      - Crawl request accepted
                  domain:
                    type: string
                required:
                  - message
