name: 'AAO-SECRETARIAT v2 — Arbiter'
description: 'Decides approve/request-changes/comment/escalate from the reviewer findings and posts the PR review.'
author: 'Ad Context Protocol'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  github-token:
    description: 'GitHub App installation token (AAO-SECRETARIAT app)'
    required: true
  findings-json:
    description: 'Structured findings from the reviewer step'
    required: true
  aao-secretariat-md-body:
    description: 'Repo Context section of AAO-SECRETARIAT.md'
    required: false
    default: ''
  high-risk:
    description: '"true" if setup flagged high-risk paths'
    required: true
  high-risk-reasons:
    description: 'JSON array of high-risk reasons'
    required: false
    default: '[]'
  gated-paths:
    description: '"true" if setup flagged gated paths'
    required: false
    default: 'false'
  gated-paths-reasons:
    description: 'JSON array of gated-path reasons'
    required: false
    default: '[]'
  review-decision:
    description: 'Raw GitHub reviewDecision (APPROVED | CHANGES_REQUESTED | REVIEW_REQUIRED | "")'
    required: false
    default: ''
  escalation-reviewers:
    description: 'Comma-separated reviewers (GitHub user logins and/or org/team-slug) to request when escalating'
    required: false
    default: ''
  no-auto-approve-teams:
    description: 'Comma-separated team slugs'
    required: false
    default: ''
  protected-branches:
    description: 'Comma-separated branches'
    required: false
    default: ''
  prior-decision:
    description: 'JSON-serialized prior decision marker (or empty)'
    required: false
    default: ''
  pr-number:
    description: 'PR number'
    required: true
  head-sha:
    description: 'Head SHA'
    required: true
  base-sha:
    description: 'Base SHA'
    required: true
  diff-full-path:
    description: 'Path to full PR diff (used to compute diff stats only)'
    required: true
  model:
    description: 'Claude model for the decision call'
    required: false
    default: 'claude-sonnet-4-6'
  decision-label:
    description: 'Label applied on escalate'
    required: false
    default: 'aao-secretariat/needs-human-review'

outputs:
  outcome:
    description: 'approve | request-changes | comment | escalate'

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'shield'
  color: 'purple'
